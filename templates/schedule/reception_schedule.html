{% extends "base.html" %}
{% load rbac %}
{% load static %}
{% block extra_css %} <link rel="stylesheet" href="{% static 'css/schedule.css' %}">{% endblock %}
{% block title %}Grafiki{% endblock %}
{% block content %}

<div class="schedule-container">

<table class="table table-sm schedule-table">

{% for row in schedule %}
<tr>

{% for cell in row %}
<td class="
    schedule-cell
    {% if not cell %}schedule-module__empty{% endif %}
    {% if cell and cell|slice:":4" == "8.00" %}schedule-morning{% endif %}
    {% if cell and cell|slice:"-5:" == "22.00" %}schedule-afternoon{% endif %}
">
    {{ cell }}
</td>
{% endfor %}

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
