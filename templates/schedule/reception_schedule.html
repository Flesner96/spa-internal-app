{% extends "base.html" %}
{% block title %}Grafiki{% endblock %}
{% block extra_css %} 
<link rel="stylesheet" href="{% static 'css/schedule.css' %}">
{% endblock %}
{% block content %}

<div class="schedule-container">

<table class="table table-sm schedule-table">

{% for row in schedule %}
<tr>

{% for cell in row %}
<td class="schedule-module__cell {% if not cell %}schedule-module__empty{% endif %}">
    {{ cell }}
</td>
{% endfor %}

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
