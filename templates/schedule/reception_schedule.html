{% extends "base.html" %}
{% load rbac%}
{% load static %}
{% block extra_css %} <link rel="stylesheet" href="{% static 'css/schedule.css' %}">{% endblock %}
{% block title %}Grafiki{% endblock %}
{% block content %}

<div class="schedule-wrapper">

<table class="table table-sm schedule-table">

{% for row in schedule %}
<tr>

{% for cell in row %}
<td class="schedule-cell schedule-{{ cell.type }}">
    {{ cell.value }}
</td>
{% endfor %}

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
