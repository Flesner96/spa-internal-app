{% extends "base.html" %}
{% block title %}Grafiki{% endblock %}

{% block content %}

<div class="schedules-container">

<table class="table table-sm schedules-table">

{% for row in schedule %}
<tr>

{% for cell in row %}
<td class="schedule-module__cell {% if not cell %}schedule-module__empty{% endif %}">
    {{ cell }}
</td>
{% endfor %}

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
